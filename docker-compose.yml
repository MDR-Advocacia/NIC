version: '3.8'

services:
  # --- APLICAÇÃO (LARAVEL BACKEND) ---
  app:
    build:
      context: ./concilia-backend
      dockerfile: Dockerfile
    container_name: concilia_app_teste
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - ./concilia-backend/src:/var/www/html
    env_file:
      - ./concilia-backend/src/.env
    networks:
      - concilia_network_teste
    depends_on:
      - db

  # --- SERVIDOR WEB (NGINX - INTERFACE DO BACKEND) ---
  nginx:
    image: nginx:1.19-alpine
    container_name: concilia_nginx_teste
    restart: unless-stopped
    # No Coolify, o FQDN api-nic-lab.mdradvocacia.com deve apontar para este serviço
    volumes:
      - ./concilia-backend/src:/var/www/html
      - ./concilia-backend/docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - concilia_network_teste

  # --- BANCO DE DADOS (MYSQL) ---
  db:
    image: mysql:8.0
    container_name: concilia_db_teste
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: concilia_db
      MYSQL_USER: conciliauser
      MYSQL_PASSWORD: root
      MYSQL_ROOT_PASSWORD: root
    volumes:
      - db_data_teste:/var/lib/mysql
    networks:
      - concilia_network_teste

  # --- FRONTEND (REACT/VITE) ---
  frontend:
    build:
      context: ./concilia-frontend
      dockerfile: Dockerfile
    container_name: concilia_frontend_teste
    restart: unless-stopped
    networks:
      - concilia_network_teste
    environment:
      # CRÍTICO: O Frontend precisa da URL pública do Backend para funcionar no navegador
      - VITE_API_URL=https://api-nic-lab.mdradvocacia.com/api

networks:
  concilia_network_teste:
    driver: bridge

volumes:
  db_data_teste:
