version: '3.8'

services:
  # --- APLICAÇÃO (LARAVEL) ---
  app:
    build:
      context: ./concilia-backend
      dockerfile: Dockerfile
    container_name: concilia_app
    restart: unless-stopped
    working_dir: /var/www/html
    # volumes:  
    #   - ./concilia-backend/src:/var/www/html
    networks:
      - concilia_network
    depends_on:
      - db
    command: >
      sh -c "mkdir -p storage/framework/views storage/framework/cache storage/framework/sessions bootstrap/cache resources/views
      && chmod -R 777 storage bootstrap/cache
      && php artisan key:generate --force
      && php-fpm"

  # --- SERVIDOR WEB (NGINX) ---
  nginx:
    image: nginx:1.19-alpine
    container_name: concilia_nginx
    restart: unless-stopped
    ports:
      - "8123:80"
    volumes:
      # - ./concilia-backend/src:/var/www/html  
      - ./concilia-backend/docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - concilia_network

  # --- BANCO DE DADOS (MYSQL) ---
  db:
    image: mysql:8.0
    container_name: concilia_db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: concilia_db
      MYSQL_USER: conciliauser
      MYSQL_PASSWORD: root
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - concilia_network

  # --- FRONTEND (REACT/VITE) ---
  frontend:
    build:
      context: ./concilia-frontend
      dockerfile: Dockerfile
    container_name: concilia_frontend
    restart: unless-stopped
    ports:
      - "5173:5173"
    # volumes:
    #   - ./concilia-frontend:/app
    #   - /app/node_modules
    networks:
      - concilia_network
    deploy:
      resources:
        limits:
          memory: 1024M
    environment:
      - VITE_API_URL=${VITE_API_URL:-https://api-nic-lab.mdradvocacia.com/api}

networks:
  concilia_network:
    driver: bridge

volumes:
  db_data_v2: