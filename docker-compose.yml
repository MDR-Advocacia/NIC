version: '3.8'

services:
  # --- APLICAÇÃO (LARAVEL) ---
  app:
    build:
      context: ./concilia-backend
      dockerfile: Dockerfile
    container_name: concilia_app
    restart: unless-stopped
    working_dir: /var/www/
    volumes:
      - ./concilia-backend/src:/var/www
    env_file:
      - ./.env
    networks:
      - concilia_network

  # --- SERVIDOR WEB (NGINX) ---
  nginx:
    image: nginx:1.19-alpine
    container_name: concilia_nginx
    restart: unless-stopped
    ports:
      - "8123:80"
    volumes:
      - ./concilia-backend/src:/var/www
      - ./concilia-backend/docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - concilia_network

  # --- BANCO DE DADOS (MYSQL) - ESTAVA FALTANDO ISSO ---
  db:
    image: mysql:8.0
    container_name: concilia_db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: concilia_db
      MYSQL_USER: conciliauser
      MYSQL_PASSWORD: root
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - concilia_network

networks:
  concilia_network:
    driver: bridge

volumes:
  db_data:
