version: '3.8'

services:
  # --- APLICAÇÃO (LARAVEL) ---
  app:
    build:
      context: ./concilia-backend
      dockerfile: Dockerfile
    container_name: concilia_app
    restart: unless-stopped
    working_dir: /var/www/html
    # Remova volumes de código em produção no Coolify para evitar conflitos
    env_file:
      - ./concilia-backend/src/.env
    networks:
      - concilia_network
    depends_on:
      - db

  # --- SERVIDOR WEB (NGINX) ---
  nginx:
    image: nginx:1.19-alpine
    container_name: concilia_nginx
    restart: unless-stopped
    ports:
      - "8123:80"
    # IMPORTANTE: Removido o volume do default.conf para evitar erro de deploy
    # Você deve adicionar o conteúdo do default.conf na aba STORAGE do Coolify
    depends_on:
      - app
    networks:
      - concilia_network

  # --- BANCO DE DADOS (MYSQL) ---
  db:
    image: mysql:8.0
    container_name: concilia_db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: concilia_db
      MYSQL_USER: conciliauser
      MYSQL_PASSWORD: root
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - concilia_network

  # --- FRONTEND (REACT/VITE) ---
  frontend:
    build:
      context: ./concilia-frontend
      dockerfile: Dockerfile
    container_name: concilia_frontend
    restart: unless-stopped
    ports:
      - "5173:5173"
    networks:
      - concilia_network
    environment:
      # Use a URL real que você definiu no FQDN do serviço Nginx
      - VITE_API_URL=https://api-nic.mdradvocacia.com/api 

networks:
  concilia_network:
    driver: bridge

volumes:
  db_data:
