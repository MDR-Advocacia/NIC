services:
  # --- APLICAÇÃO (LARAVEL) ---
  app:
    build:
      context: ./concilia-backend
      dockerfile: Dockerfile
    container_name: concilia_app
    restart: unless-stopped
    working_dir: /var/www/html
    environment:
      APP_ENV: ${APP_ENV:-production}
      APP_DEBUG: ${APP_DEBUG:-false}
      APP_URL: ${APP_URL:-http://localhost:8123}
      APP_KEY: ${APP_KEY:-}
      DB_CONNECTION: ${DB_CONNECTION:-mysql}
      DB_HOST: ${DB_HOST:-db}
      DB_PORT: ${DB_PORT:-3306}
      DB_DATABASE: ${DB_DATABASE:-concilia_db}
      DB_USERNAME: ${DB_USERNAME:-conciliauser}
      DB_PASSWORD: ${DB_PASSWORD:-root}
      CACHE_STORE: ${CACHE_STORE:-array}
      SESSION_DRIVER: ${SESSION_DRIVER:-array}
      QUEUE_CONNECTION: ${QUEUE_CONNECTION:-sync}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:5173}
      SANCTUM_STATEFUL_DOMAINS: ${SANCTUM_STATEFUL_DOMAINS:-localhost,localhost:5173,127.0.0.1,127.0.0.1:5173}
    # volumes:  
    #   - ./concilia-backend/src:/var/www/html
    depends_on:
      - db
    command: >
      sh -c "[ -f .env ] || cp .env.example .env &&
      grep -q '^APP_KEY=' .env || printf '\nAPP_KEY=\n' >> .env &&
      mkdir -p storage/framework/views storage/framework/cache storage/framework/sessions bootstrap/cache resources/views &&
      chmod -R 777 storage bootstrap/cache &&
      if [ -z \"${APP_KEY:-}\" ]; then php artisan key:generate --force; fi &&
      php artisan config:clear &&
      exec php-fpm"

  # --- SERVIDOR WEB (NGINX) ---
  nginx:
    image: nginx:1.19-alpine
    container_name: concilia_nginx
    restart: unless-stopped
    ports:
      - "8123:80"
    volumes:
      # - ./concilia-backend/src:/var/www/html  
      - ./concilia-backend/docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
  # --- BANCO DE DADOS (MYSQL) ---
  db:
    image: mysql:8.0
    container_name: concilia_db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: concilia_db
      MYSQL_USER: conciliauser
      MYSQL_PASSWORD: root
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
  # --- FRONTEND (REACT/VITE) ---
  frontend:
    build:
      context: ./concilia-frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:8123/api}
    container_name: concilia_frontend
    restart: unless-stopped
    ports:
      - "5173:5173"
    # volumes:
    #   - ./concilia-frontend:/app
    #   - /app/node_modules
    deploy:
      resources:
        limits:
          memory: 1024M
    environment:
      VITE_API_URL: ${VITE_API_URL:-http://localhost:8123/api}

volumes:
  db_data:
