services:
  app:
    build:
      context: ./concilia-backend
      dockerfile: Dockerfile
    container_name: concilia_app_teste
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - ./concilia-backend/src:/var/www/html
    networks:
      - concilia_network

  # --- SERVIDOR WEB (NGINX) ---
  nginx:
    image: nginx:1.19-alpine
    container_name: concilia_nginx
    restart: unless-stopped
    ports:
      - "8123:80"
    volumes:
      - ./concilia-backend/src:/var/www/html
      - ./concilia-backend/docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - concilia_network

  # --- BANCO DE DADOS (MYSQL) ---
  db:
    image: mysql:8.0
    container_name: concilia_db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: concilia_db
      MYSQL_USER: conciliauser
      MYSQL_PASSWORD: root
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - concilia_network

  # --- FRONTEND (REACT/VITE) - ADICIONADO ---
  frontend:
    build:
      context: ./concilia-frontend
      dockerfile: Dockerfile
    container_name: concilia_frontend
    restart: unless-stopped
    ports:
      - "5173:5173" # Porta padrão do Vite
    volumes:
      - ./concilia-frontend:/app
      - /app/node_modules # Evita sobrescrever node_modules do container
    networks:
      - concilia_network
    environment:
      # Aponta para o NGINX (porta externa mapeada no docker-compose)
      - VITE_API_URL=http://localhost:8123/api 

networks:
  concilia_network:
    driver: bridge

volumes:
  db_data:version: '3.8'

services:
  # --- APLICAÇÃO (LARAVEL) ---
  app:
    build:
      context: ./concilia-backend
      dockerfile: Dockerfile
    container_name: concilia_app_teste  # <--- MUDADO (Nome único)
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - ./concilia-backend/src:/var/www/html
    env_file:
      - ./concilia-backend/src/.env
    networks:
      - concilia_network_teste          # <--- MUDADO (Rede separada)
    depends_on:
      - db
  nginx:
    image: nginx:1.19-alpine
    container_name: concilia_nginx_teste
    restart: unless-stopped
    volumes:
      - ./concilia-backend/src:/var/www/html
      - ./concilia-backend/docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - concilia_network_teste
  db:
    image: mysql:8.0
    container_name: concilia_db_teste
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: concilia_db
      MYSQL_USER: conciliauser
      MYSQL_PASSWORD: root
      MYSQL_ROOT_PASSWORD: root
    volumes:
      - db_data_teste:/var/lib/mysql
    networks:
      - concilia_network_teste
  frontend:
    build:
      context: ./concilia-frontend
      dockerfile: Dockerfile
    container_name: concilia_frontend_teste
    restart: unless-stopped
    networks:
      - concilia_network_teste
    deploy:
      resources:
        limits:
          memory: 1024M
    environment:
      - VITE_API_URL=https://api-nic-lab.mdradvocacia.com/api

networks:
  concilia_network_teste:
    driver: bridge

volumes:
  db_data_teste:
