version: '3.8'

services:
  # --- SERVIÇOS DO BACKEND (Laravel) ---
  app:
    build:
      context: ./concilia-backend
      dockerfile: Dockerfile
    container_name: concilia_app
    restart: unless-stopped
    working_dir: /var/www/
    volumes:
      - ./concilia-backend/src:/var/www
    env_file:
      - ./.env
    networks:
      - concilia_network

  nginx:
    image: nginx:1.19-alpine
    container_name: concilia_nginx
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - ./concilia-backend/src:/var/www
      - ./concilia-backend/docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - concilia_network

networks:
  concilia_network:
    driver: bridge